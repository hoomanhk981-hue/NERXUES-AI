name: Build Android APK

# این بخش مشخص می‌کند که ورک‌فلو چه زمانی اجرا شود (مثلاً با هر پوش روی شاخه اصلی)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # این گزینه به شما اجازه می‌دهد ورک‌فلو را دستی هم اجرا کنید

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ۱. دریافت کدهای پروژه از گیت‌هاب
      - name: Checkout Code
        uses: actions/checkout@v4

      # ۲. راه‌اندازی جاوا (نسخه ۱۷ برای پروژه‌های مدرن اندروید مناسب است)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ۳. دادن مجوز دسترسی برای اجرای گریدل (Gradle Executable)
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # ۴. بیلد کردن فایل APK دیباگ به وسیله گریدل
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ۵. آپلود فایل APK ساخته شده به عنوان خروجی (Artifact) در گیت‌هاب
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
